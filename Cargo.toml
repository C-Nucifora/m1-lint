[package]
name = "m1-lint"
version = "0.2.0"
edition = "2024"
description = "Linter for the MoTeC M1 script language"
license = "MIT"

[[bin]]
name = "m1-lint"
path = "src/main.rs"

[lib]
name = "m1_lint"
path = "src/lib.rs"

[dependencies]
m1-core = { git = "https://github.com/C-Nucifora/m1-core.git", branch = "main" }
toml = "0.8"

[dev-dependencies]
# none in v1

[profile.release]
opt-level = 3
